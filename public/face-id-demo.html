<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Face ID Demo</title>
	<style>
		body {
			margin: 0;
			padding: 20px;
			font-family: Arial, sans-serif;
			background: #f3f4f6;
			color: #111827;
		}

		.container {
			max-width: 920px;
			margin: 0 auto;
			background: #fff;
			border-radius: 12px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
			padding: 18px;
		}

		h1 {
			margin-top: 0;
			font-size: 22px;
		}

		.grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 16px;
		}

		@media (max-width: 860px) {
			.grid {
				grid-template-columns: 1fr;
			}
		}

		.field {
			display: flex;
			flex-direction: column;
			gap: 6px;
			margin-bottom: 12px;
		}

		label {
			font-size: 13px;
			font-weight: 600;
		}

		input {
			padding: 10px;
			font-size: 14px;
			border: 1px solid #d1d5db;
			border-radius: 8px;
		}

		video {
			width: 100%;
			max-height: 360px;
			background: #000;
			border-radius: 10px;
		}

		.actions {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
			margin-top: 12px;
		}

		button {
			padding: 10px 14px;
			border: none;
			border-radius: 8px;
			font-weight: 700;
			cursor: pointer;
		}

		button.primary {
			background: #0f766e;
			color: #fff;
		}

		button.secondary {
			background: #1d4ed8;
			color: #fff;
		}

		button.neutral {
			background: #374151;
			color: #fff;
		}

		.log {
			margin-top: 12px;
			background: #111827;
			color: #e5e7eb;
			border-radius: 8px;
			padding: 10px;
			min-height: 120px;
			white-space: pre-wrap;
			font-size: 12px;
		}

		.hint {
			font-size: 12px;
			color: #4b5563;
			margin-top: 8px;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Face ID Demo</h1>
		<p class="hint">This page auto-opens your camera, extracts descriptor using face-api.js, and calls your backend Face ID endpoints.</p>

		<div class="grid">
			<div>
				<video id="video" autoplay muted playsinline></video>
				<div class="actions">
					<button id="startBtn" class="neutral" type="button">Restart Camera</button>
					<button id="registerBtn" class="primary" type="button">Register Face</button>
					<button id="loginBtn" class="secondary" type="button">Login With Face</button>
				</div>
			</div>

			<div>
				<div class="field">
					<label for="apiBase">API Base URL</label>
					<input id="apiBase" type="text" />
				</div>
				<div class="field">
					<label for="token">Access Token (needed for register)</label>
					<input id="token" type="text" placeholder="Bearer access token" />
				</div>
				<div class="field">
					<label for="threshold">Threshold (login)</label>
					<input id="threshold" type="number" step="0.01" min="0.01" max="2" value="0.45" />
				</div>

				<div id="log" class="log"></div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
	<script>
		const MODEL_URL = "https://justadudewhohacks.github.io/face-api.js/models";
		const video = document.getElementById("video");
		const apiBaseInput = document.getElementById("apiBase");
		const tokenInput = document.getElementById("token");
		const thresholdInput = document.getElementById("threshold");
		const logEl = document.getElementById("log");
		let mediaStream = null;

		const log = message => {
			const time = new Date().toLocaleTimeString();
			logEl.textContent = `[${time}] ${message}\n${logEl.textContent}`;
		};

		const getApiBase = () => {
			return String(apiBaseInput.value || "").trim().replace(/\/+$/, "");
		};

		const initModels = async () => {
			log("Loading face-api models...");
			await Promise.all([
				faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
				faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
				faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
			]);
			log("Models loaded.");
		};

		const startCamera = async () => {
			if (mediaStream) {
				mediaStream.getTracks().forEach(track => track.stop());
			}

			log("Requesting camera permission...");
			mediaStream = await navigator.mediaDevices.getUserMedia({
				video: { facingMode: "user" },
				audio: false,
			});
			video.srcObject = mediaStream;
			await video.play();
			log("Camera ready.");
		};

		const getDescriptor = async () => {
			const detection = await faceapi
				.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
				.withFaceLandmarks()
				.withFaceDescriptor();

			if (!detection) {
				throw new Error("No face detected. Keep face centered and well lit.");
			}

			return Array.from(detection.descriptor);
		};

		const registerFace = async () => {
			const token = String(tokenInput.value || "").trim();
			if (!token) {
				throw new Error("Access token is required for register.");
			}

			const descriptor = await getDescriptor();
			const res = await fetch(`${getApiBase()}/api/auth/face`, {
				method: "PATCH",
				headers: {
					"Content-Type": "application/json",
					Authorization: token.startsWith("Bearer ") ? token : `Bearer ${token}`,
				},
				body: JSON.stringify({ descriptor }),
			});

			const body = await res.json().catch(() => ({}));
			if (!res.ok) {
				throw new Error(body.message || `Register failed (${res.status})`);
			}

			log(`Face registered. userId=${body.user?._id || "unknown"}`);
		};

		const loginFace = async () => {
			const threshold = Number(thresholdInput.value || 0.45);
			const descriptor = await getDescriptor();

			const res = await fetch(`${getApiBase()}/api/auth/login/face`, {
				method: "POST",
				headers: { "Content-Type": "application/json" },
				body: JSON.stringify({ descriptor, threshold }),
			});

			const body = await res.json().catch(() => ({}));
			if (!res.ok) {
				throw new Error(body.message || `Face login failed (${res.status})`);
			}

			log(`Face login success. matchDistance=${body.matchDistance}`);
			if (body.accessToken) {
				tokenInput.value = body.accessToken;
			}
		};

		document.getElementById("startBtn").addEventListener("click", async () => {
			try {
				await startCamera();
			} catch (error) {
				log(`Camera error: ${error.message}`);
			}
		});

		document.getElementById("registerBtn").addEventListener("click", async () => {
			try {
				await registerFace();
			} catch (error) {
				log(error.message);
			}
		});

		document.getElementById("loginBtn").addEventListener("click", async () => {
			try {
				await loginFace();
			} catch (error) {
				log(error.message);
			}
		});

		(async () => {
			apiBaseInput.value = window.location.origin;
			try {
				await initModels();
				await startCamera();
			} catch (error) {
				log(`Init failed: ${error.message}`);
			}
		})();
	</script>
</body>
</html>
